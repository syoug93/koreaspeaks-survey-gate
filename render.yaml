services:
  - type: web
    name: koreaspeaks-survey-gate
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/config
    envVars:
      - key: AUTH_MODE
        value: REAL
      - key: SURVEY_MODE
        value: HYBRID
      - key: MIN_AGE
        value: 20
      - key: MAX_AGE
        value: 39
      - key: EXTERNAL_SURVEY_URL
        value: https://docs.google.com/forms/d/e/1FAIpQLSdHDa0iHyUTuMbnaFCshHEyLupmmSTVs1563bfB4nxG6ij1xg/viewform?usp=dialog
      - key: RESPONSES_FILE
        value: ./data/responses.jsonl
      - key: DATABASE_URL
        sync: false
      - key: SERVICE_NAME
        value: 코리아스픽스 국민대화 설문
      - key: OPERATOR_NAME
        value: 코리아스픽스
      - key: OPERATOR_CONTACT
        sync: false
      - key: BUSINESS_INFO
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: PORTONE_STORE_ID
        sync: false
      - key: PORTONE_CHANNEL_KEY
        sync: false
      - key: PORTONE_API_SECRET
        sync: false
