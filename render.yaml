services:
  - type: web
    name: koreaspeaks-survey-gate
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/config
    envVars:
      - key: AUTH_MODE
        value: REAL
      - key: SURVEY_MODE
        value: HYBRID
      - key: MIN_AGE
        value: 19
      - key: MAX_AGE
        value: 39
      - key: EXTERNAL_SURVEY_URL
        value: https://docs.google.com/forms/d/e/1FAIpQLSdHDa0iHyUTuMbnaFCshHEyLupmmSTVs1563bfB4nxG6ij1xg/viewform?usp=dialog
      - key: RESPONSES_FILE
        value: ./data/responses.jsonl
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SERVICE_NAME
        value: 현장형 국민대화 신청접수 및 설문
      - key: OPERATOR_NAME
        value: 코리아스픽스(주)
      - key: OPERATOR_CONTACT
        value: 02-3280-0564
      - key: BUSINESS_INFO
        value: 사업자등록번호 107-87-82338 / 대표자 이병덕 / 주소 서울특별시 마포구 양화로 81, 408호
      - key: PUBLIC_BASE_URL
        sync: false
      - key: PORTONE_STORE_ID
        sync: false
      - key: PORTONE_CHANNEL_KEY
        sync: false
      - key: PORTONE_API_SECRET
        sync: false
